spring:
  application:
    name: voting-system
  
  datasource:
    url: jdbc:h2:mem:votingdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong
  expiration: 86400000

voting:
  security:
    max-votes-per-ip: 10
    ip-restriction-hours: 24
